<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aegis</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Aegis</h1>
      </header>

      <section class="card countdown-card" id="countdown-card">
        <div class="dial-wrap">
          <svg class="dial" viewBox="0 0 320 320" aria-hidden="true">
            <circle class="dial-track" cx="160" cy="160" r="132"></circle>
            <circle id="countdown-ring" class="dial-progress" cx="160" cy="160" r="132"></circle>
          </svg>
          <div class="dial-center">
            <p id="timer-state" class="dial-state">Idle</p>
            <p id="timer-countdown" class="dial-time">--:--</p>
            <p id="timer-eta" class="dial-eta">Set a timer to begin</p>
          </div>
        </div>

        <div class="preset-row">
          <button class="chip" type="button" data-minutes="15">15m</button>
          <button class="chip" type="button" data-minutes="30">30m</button>
          <button class="chip" type="button" data-minutes="45">45m</button>
          <button class="chip" type="button" data-minutes="60">60m</button>
        </div>

        <div class="control-panel">
          <form id="timer-form" class="timer-row">
            <label class="field grow-field">
              Minutes
              <input id="timer-minutes" type="number" min="1" value="45" required />
            </label>
            <button type="submit" class="btn btn-primary">Set Timer</button>
            <button id="cancel-timer" type="button" class="btn btn-secondary">Cancel Timer</button>
          </form>
        </div>
        <p id="action-line" class="action-line">Ready</p>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
